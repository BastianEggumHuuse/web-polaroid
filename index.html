<!DOCTYPE html>

<head>
	<link rel="stylesheet" href="front_end/main.css">

	<h1 id ="header">Web polaroid</h1>
</head>

<body>
	<div style = "width:1650px; height:550px;">
		<div id = "basic_container" style= "width:300px;">
			<p>The web polaroid is a service that allows you to take instant photos that are sent to our server. You only get a limited amount of photos, so make sure it's worth it!</p>
			<p>This is the desktop variant, the mobile variant is currently under development</p>

			<!-- Button to start video -->
			<button type="button" onclick="camera_init()">Start camera</button>

			<!-- shutter  -->
			<button type="button" onclick="camera_shutter()">Snap!</button>

			<!-- slider for zoom -->
			<input type="range" min="0" max="100" value="0" class="slider" id="zoom_slider">
		</div>

		<div class="stage" id = "stage_user">
			<!-- Viewfinder -->
			<video class="viewfinder" id = "viewfinder_user"></video>
		</div>

		<div class="stage" id = "stage_environment">
			<!-- Viewfinder -->
			<video class="viewfinder" id = "viewfinder_environment"></video>
		</div>

		<div id = "basic_container" style= "width:300px;"></div>

		<div class="stage">
			<!-- snapshot -->
			<canvas class="snapshot" id="snapshot_user" width="640px" height="480px"></canvas>
		</div>

		<div class="stage">
			<!-- snapshot -->
			<canvas class="snapshot" id="snapshot_environment" width="640px" height="480px"></canvas>
		</div>
	</div>
	<!-- scripts -->
	<script src="back_end/camera.js"></script>
</body>
