<!DOCTYPE html>

<head>
	<link rel="stylesheet" href="front_end/main.css">
	<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
</head>
<body>
  <h1 id="header">Web polaroid</h1>

  <div class="stage">
    <video class="viewfinder" id="viewfinder_user"></video>
    <video class="viewfinder" id="viewfinder_environment"></video>
  </div>

  <div id="controls">
    <button onclick="camera_init()">Start</button>
    <button onclick="camera_shutter()">Snap!</button>
    <button onclick="swap_cam()">Swap</button>
    <button onclick="zoom_in()">+</button>
    <button onclick="zoom_out()">-</button>
  </div>

  <canvas id="snapshot_user" style="display:none;"></canvas>
  <canvas id="snapshot_environment" style="display:none;"></canvas>
  
  <div id="flash"></div>

  <script src="back_end/camera.js"></script>
</body>
